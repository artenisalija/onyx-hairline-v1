name: Publiko Onyx Hairline V1

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Merr kodin
        uses: actions/checkout@v4
      - name: Përgatit Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Instalo varësitë
        run: npm ci
      - name: Ndërto faqen statike
        run: npm run build
      - name: Përgatit GitHub Pages
        uses: actions/configure-pages@v5
      - name: Ngarko paketën statike
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Publiko faqen
        id: deployment
        uses: actions/deploy-pages@v4
